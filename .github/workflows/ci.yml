name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Compile Python scripts
        run: python -m compileall -q scripts

      - name: Check shell script syntax
        run: |
          bash -n scripts/displayotron-check.sh
          bash -n scripts/deploy-to-pi.sh

      - name: Run off-device tests
        run: python -m pytest -m "not pi" -q
